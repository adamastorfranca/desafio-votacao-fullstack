services:
  postgres-db:
    image: postgres:16-alpine
    container_name: votacao-db
    environment:
      - POSTGRES_DB=votacao_db
      - POSTGRES_USER=app_votacao
      - POSTGRES_PASSWORD=senha_desafio_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_votacao -d votacao_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: votacao-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: