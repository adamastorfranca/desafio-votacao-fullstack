spring:
  application:
    name: desafio-votacao
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs